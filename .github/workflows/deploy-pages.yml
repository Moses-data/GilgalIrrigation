name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject contact values
        env:
          CONTACT_PHONE: ${{ secrets.CONTACT_PHONE }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          CONTACT_LOCATION: ${{ secrets.CONTACT_LOCATION }}
        run: |
          python - << 'PY'
          from pathlib import Path
          import os

          p = Path("index.html")
          s = p.read_text(encoding="utf-8")
          s = s.replace("{{PHONE}}", os.getenv("CONTACT_PHONE", ""))
          s = s.replace("{{EMAIL}}", os.getenv("CONTACT_EMAIL", ""))
          s = s.replace("{{LOCATION}}", os.getenv("CONTACT_LOCATION", ""))
          p.write_text(s, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
